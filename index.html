    <!-- pantalla de carga: se desvanece cuando la app está lista -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0e0e10;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
      }

      }

        50% { transform: scale(1.07); }
      }
    </style>
